// ── Persistence helpers ──
function loadStore() {
try { return JSON.parse(localStorage.getItem(“screenlog-data”)) || {}; } catch { return {}; }
}
function saveStore(store) {
localStorage.setItem(“screenlog-data”, JSON.stringify(store));
}
function getLastUser() {
return localStorage.getItem(“screenlog-user”) || null;
}
function setLastUser(name) {
localStorage.setItem(“screenlog-user”, name || “”);
}

// ── Components ──

function StarRating({ rating, onRate, size = 15, interactive = true }) {
const [hover, setHover] = useState(0);
return (
<div style={{ display: “flex”, gap: 2, cursor: interactive ? “pointer” : “default” }}>
{[1,2,3,4,5].map(star => {
const filled = hover ? star <= hover : star <= rating;
return <span key={star}
onClick={e => { e.stopPropagation(); if (interactive) onRate(star); }}
onMouseEnter={() => interactive && setHover(star)}
onMouseLeave={() => interactive && setHover(0)}
style={{ fontSize: size, lineHeight: 1, color: filled ? “#F6C700” : “rgba(255,255,255,0.12)”, transition: “color 0.15s, transform 0.15s”, transform: hover === star ? “scale(1.3)” : “scale(1)”, userSelect: “none” }}>★</span>;
})}
</div>
);
}

function ActionBtn({ icon, label, onClick, color }) {
const [h, setH] = useState(false);
return <button onClick={e => { e.stopPropagation(); onClick(); }}
onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
style={{ background: h ? color : `${color}dd`, border: “none”, color: “#fff”, borderRadius: 6, padding: “6px 12px”, cursor: “pointer”, fontSize: 11, fontWeight: 600, fontFamily: “‘DM Sans’, sans-serif”, display: “flex”, alignItems: “center”, gap: 4, transition: “all 0.2s”, transform: h ? “scale(1.05)” : “scale(1)” }}>
<span style={{ fontSize: 12 }}>{icon}</span>{label}
</button>;
}

function PosterCard({ item, onAdd, onRemove, onRate, listType, animDelay = 0, hasUser }) {
const [imgLoaded, setImgLoaded] = useState(false);
const [hovered, setHovered] = useState(false);
const title = item.title || item.name || “Untitled”;
const year = (item.release_date || item.first_air_date || “”).slice(0, 4);
const type = item.media_type === “tv” ? “TV” : “Film”;
const poster = item.poster_path ? `${TMDB_IMG}${item.poster_path}` : null;

return (
<div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
style={{
position: “relative”, borderRadius: 10, overflow: “hidden”, background: “#12122a”,
transition: “transform 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.3s”,
transform: hovered ? “translateY(-6px)” : “translateY(0)”,
boxShadow: hovered ? “0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(123,47,247,0.15)” : “0 2px 8px rgba(0,0,0,0.2)”,
display: “flex”, flexDirection: “column”, animation: `fadeSlideUp 0.45s ${animDelay}s both`,
}}>
<div style={{ position: “relative”, paddingTop: “150%”, background: “#0a0a1a” }}>
{poster ? <img src={poster} alt={title} onLoad={() => setImgLoaded(true)}
style={{ position: “absolute”, top: 0, left: 0, width: “100%”, height: “100%”, objectFit: “cover”, opacity: imgLoaded ? 1 : 0, transition: “opacity 0.5s” }} />
: <div style={{ position: “absolute”, top: 0, left: 0, width: “100%”, height: “100%”, background: “linear-gradient(135deg, #1a1a2e, #16213e)”, display: “flex”, alignItems: “center”, justifyContent: “center”, flexDirection: “column”, gap: 8, padding: 14, textAlign: “center” }}>
<span style={{ fontSize: 32, opacity: 0.4 }}>{type === “TV” ? “📺” : “🎬”}</span>
<span style={{ fontFamily: “‘Playfair Display’, serif”, fontSize: 12, color: “rgba(255,255,255,0.6)”, lineHeight: 1.3 }}>{title}</span>
</div>}
<span style={{ position: “absolute”, top: 8, left: 8, background: type === “TV” ? “#7B2FF7” : “#E50914”, color: “#fff”, fontSize: 9, fontWeight: 700, padding: “2px 7px”, borderRadius: 4, letterSpacing: “0.1em”, textTransform: “uppercase”, fontFamily: “‘DM Sans’, sans-serif” }}>{type}</span>
{item.vote_average > 0 && <span style={{ position: “absolute”, top: 8, right: 8, background: “rgba(0,0,0,0.7)”, backdropFilter: “blur(8px)”, color: “#F6C700”, fontSize: 11, fontWeight: 700, padding: “2px 7px”, borderRadius: 4, fontFamily: “‘DM Sans’, sans-serif” }}>★ {Number(item.vote_average).toFixed(1)}</span>}
<div style={{ position: “absolute”, bottom: 0, left: 0, right: 0, background: “linear-gradient(transparent, rgba(0,0,0,0.92))”, padding: “36px 8px 8px”, display: “flex”, gap: 5, justifyContent: “center”, opacity: hovered ? 1 : 0, transition: “opacity 0.25s” }}>
{listType === “search” && hasUser && <>
<ActionBtn icon=“👁” label=“Watchlist” onClick={() => onAdd(item, “watchlist”)} color=”#7B2FF7” />
<ActionBtn icon=“✓” label=“Watched” onClick={() => onAdd(item, “watched”)} color=”#00B894” />
</>}
{listType === “watchlist” && <>
<ActionBtn icon=“✓” label=“Watched” onClick={() => onAdd(item, “watched”)} color=”#00B894” />
<ActionBtn icon=“✕” label=“Remove” onClick={() => onRemove(item.id, “watchlist”)} color=”#E50914” />
</>}
{listType === “watched” && <ActionBtn icon=“✕” label=“Remove” onClick={() => onRemove(item.id, “watched”)} color=”#E50914” />}
</div>
</div>
<div style={{ padding: “10px 10px 12px”, flex: 1, display: “flex”, flexDirection: “column”, gap: 3 }}>
<div style={{ fontFamily: “‘Playfair Display’, serif”, fontSize: 13, fontWeight: 600, color: “#fff”, lineHeight: 1.3, overflow: “hidden”, textOverflow: “ellipsis”, display: “-webkit-box”, WebkitLineClamp: 2, WebkitBoxOrient: “vertical” }}>{title}</div>
<div style={{ fontFamily: “‘DM Sans’, sans-serif”, fontSize: 11, color: “rgba(255,255,255,0.35)” }}>{year}</div>
{listType === “watched” && <div style={{ marginTop: 4 }}><StarRating rating={item.userRating || 0} onRate={r => onRate(item.id, r)} /></div>}
</div>
</div>
);
}

function Toast({ message, visible }) {
return <div style={{ position: “fixed”, bottom: 28, left: “50%”, transform: `translateX(-50%) translateY(${visible ? 0 : 20}px)`, background: “linear-gradient(135deg, #7B2FF7 0%, #5B1FD7 100%)”, color: “#fff”, padding: “10px 26px”, borderRadius: 30, fontFamily: “‘DM Sans’, sans-serif”, fontSize: 13, fontWeight: 500, opacity: visible ? 1 : 0, transition: “all 0.3s cubic-bezier(.4,0,.2,1)”, pointerEvents: “none”, zIndex: 1000, boxShadow: “0 8px 32px rgba(123,47,247,0.35)” }}>{message}</div>;
}

function StatBlock({ label, value, suffix }) {
return <div style={{ textAlign: “center”, minWidth: 70 }}>
<div style={{ fontFamily: “‘Playfair Display’, serif”, fontSize: 26, fontWeight: 700, color: “#fff”, lineHeight: 1 }}>{value}{suffix && <span style={{ fontSize: 15, marginLeft: 2, color: “#F6C700” }}>{suffix}</span>}</div>
<div style={{ fontSize: 10, color: “rgba(255,255,255,0.3)”, textTransform: “uppercase”, letterSpacing: “0.12em”, marginTop: 4, fontFamily: “‘DM Sans’, sans-serif” }}>{label}</div>

  </div>;
}

function SectionRow({ title, items, onAdd, icon, hasUser }) {
if (!items.length) return null;
return <div style={{ marginBottom: 32 }}>
<div style={{ display: “flex”, alignItems: “center”, gap: 8, marginBottom: 14 }}>
<span style={{ fontSize: 18 }}>{icon}</span>
<h2 style={{ fontFamily: “‘Playfair Display’, serif”, fontSize: 18, fontWeight: 600, margin: 0, color: “rgba(255,255,255,0.7)” }}>{title}</h2>
</div>
<div style={{ display: “flex”, gap: 14, overflowX: “auto”, paddingBottom: 8, scrollSnapType: “x mandatory”, WebkitOverflowScrolling: “touch” }}>
{items.map((item, idx) => <div key={`${item.id}-${title}`} style={{ minWidth: 155, maxWidth: 155, scrollSnapAlign: “start” }}>
<PosterCard item={item} onAdd={onAdd} onRemove={() => {}} onRate={() => {}} listType=“search” animDelay={idx * 0.04} hasUser={hasUser} />
</div>)}
</div>

  </div>;
}

function UserModal({ onAdd, onClose }) {
const [name, setName] = useState(””);

useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
const submit = () => { if (name.trim()) { onAdd(name.trim()); } };
return <div onClick={e => { if (e.target === e.currentTarget) onClose(); }} style={{ position: “fixed”, inset: 0, background: “rgba(0,0,0,0.7)”, zIndex: 500, display: “flex”, alignItems: “center”, justifyContent: “center”, animation: “fadeIn 0.2s”, backdropFilter: “blur(4px)” }}>

function ScreenLog() {
const [tab, setTab] = useState(“discover”);
const [query, setQuery] = useState(””);
const [searchResults, setSearchResults] = useState([]);
const [trending, setTrending] = useState([]);
const [nowPlaying, setNowPlaying] = useState([]);
const [onTheAir, setOnTheAir] = useState([]);
const [upcoming, setUpcoming] = useState([]);
const [loading, setLoading] = useState(false);
const [toast, setToast] = useState({ msg: “”, show: false });
const [store, setStoreState] = useState(loadStore);
const [currentUser, setCurrentUserState] = useState(getLastUser);
const [showModal, setShowModal] = useState(false);
const searchTimeout = useRef(null);

const users = Object.keys(store);
const userData = currentUser && store[currentUser] ? store[currentUser] : { watchlist: [], watched: [] };

function updateStore(fn) {
setStoreState(prev => { const next = { …prev }; fn(next); saveStore(next); return next; });
}
function switchUser(name) { setCurrentUserState(name); setLastUser(name); }
function addUser(name) {
if (store[name]) { switchUser(name); setShowModal(false); return; }
updateStore(s => { s[name] = { watchlist: [], watched: [] }; });
switchUser(name); setShowModal(false);
}
function removeUser(name) {
if (!confirm(`Remove ${name} and all their data?`)) return;
updateStore(s => { delete s[name]; });
if (currentUser === name) { const remaining = Object.keys(store).filter(u => u !== name); switchUser(remaining[0] || null); }
}

// Fetch discover data
useEffect(() => {
async function load() {
try {
const [t, np, ota, up] = await Promise.all([
fetch(tmdb(”/trending/all/day”)).then(r => r.ok ? r.json() : { results: [] }),
fetch(tmdb(”/movie/now_playing”)).then(r => r.ok ? r.json() : { results: [] }),
fetch(tmdb(”/tv/on_the_air”)).then(r => r.ok ? r.json() : { results: [] }),
fetch(tmdb(”/movie/upcoming”)).then(r => r.ok ? r.json() : { results: [] }),
]);
const tr = (t.results || []).filter(r => r.media_type !== “person”).slice(0, 20);
const np2 = (np.results || []).map(r => ({ …r, media_type: “movie” })).slice(0, 20);
const ota2 = (ota.results || []).map(r => ({ …r, media_type: “tv” })).slice(0, 20);
const up2 = (up.results || []).map(r => ({ …r, media_type: “movie” })).slice(0, 15);
setTrending(tr.length ? tr : FALLBACK.trending || []);
setNowPlaying(np2.length ? np2 : FALLBACK.now_playing || []);
setOnTheAir(ota2.length ? ota2 : FALLBACK.on_the_air || []);
setUpcoming(up2.length ? up2 : FALLBACK.upcoming || []);
} catch {
setTrending(FALLBACK.trending || []);
setNowPlaying(FALLBACK.now_playing || []);
setOnTheAir(FALLBACK.on_the_air || []);
setUpcoming(FALLBACK.upcoming || []);
}
}
load();
}, []);

const showToast = msg => { setToast({ msg, show: true }); setTimeout(() => setToast({ msg: “”, show: false }), 2200); };

const doSearch = useCallback(async q => {
if (!q.trim()) { setSearchResults([]); setLoading(false); return; }
setLoading(true);
try {
const r = await fetch(tmdb(”/search/multi”, `&query=${encodeURIComponent(q)}`));
if (!r.ok) throw new Error();
const d = await r.json();
setSearchResults((d.results || []).filter(r => r.media_type !== “person”).slice(0, 24));
} catch {
const lower = q.toLowerCase();
const all = […(FALLBACK.trending||[]),…(FALLBACK.now_playing||[]),…(FALLBACK.on_the_air||[]),…(FALLBACK.upcoming||[])];
const seen = new Set();
setSearchResults(all.filter(i => { if (seen.has(i.id)) return false; seen.add(i.id); return (i.title||i.name||””).toLowerCase().includes(lower); }).slice(0, 24));
}
setLoading(false);
}, []);

const handleSearch = val => {
setQuery(val);
clearTimeout(searchTimeout.current);
searchTimeout.current = setTimeout(() => doSearch(val), 400);
};

const addTo = (item, list) => {
if (!currentUser) { showToast(“Add a user first”); return; }
updateStore(s => {
const data = s[currentUser] || (s[currentUser] = { watchlist: [], watched: [] });
const target = list === “watchlist” ? data.watchlist : data.watched;
if (target.find(i => i.id === item.id)) return;
const entry = { id: item.id, title: item.title || item.name, name: item.name || item.title, media_type: item.media_type, release_date: item.release_date || “”, first_air_date: item.first_air_date || “”, poster_path: item.poster_path, vote_average: item.vote_average, userRating: 0, addedAt: Date.now() };
if (list === “watchlist”) { data.watched = data.watched.filter(i => i.id !== item.id); data.watchlist = [entry, …data.watchlist]; }
else { data.watchlist = data.watchlist.filter(i => i.id !== item.id); data.watched = [entry, …data.watched]; }
});
showToast(list === “watchlist” ? “Added to Watchlist ✓” : “Added to Watched ✓”);
};

const removeFrom = (id, list) => {
updateStore(s => {
const data = s[currentUser]; if (!data) return;
if (list === “watchlist”) data.watchlist = data.watchlist.filter(i => i.id !== id);
else data.watched = data.watched.filter(i => i.id !== id);
});
showToast(“Removed”);
};

const rateItem = (id, rating) => {
updateStore(s => {
const data = s[currentUser]; if (!data) return;
data.watched = data.watched.map(i => i.id === id ? { …i, userRating: rating } : i);
});
showToast(`Rated ${rating} star${rating !== 1 ? "s" : ""} ★`);
};

const tabs = [
{ id: “discover”, label: “Discover”, count: null },
{ id: “watchlist”, label: “Watchlist”, count: userData.watchlist.length },
{ id: “watched”, label: “Watched”, count: userData.watched.length },
];

const ratedItems = userData.watched.filter(i => i.userRating > 0);
const avgRating = ratedItems.length ? (ratedItems.reduce((s, i) => s + i.userRating, 0) / ratedItems.length).toFixed(1) : “—”;

return (
<div style={{ minHeight: “100vh”, background: “#08081a”, fontFamily: “‘DM Sans’, sans-serif”, color: “#fff”, position: “relative” }}>
{/* Ambient */}
<div style={{ position: “fixed”, inset: 0, zIndex: 0, pointerEvents: “none”, background: “radial-gradient(ellipse at 15% 5%, rgba(123,47,247,0.07) 0%, transparent 55%), radial-gradient(ellipse at 85% 95%, rgba(229,9,20,0.04) 0%, transparent 55%)” }} />
